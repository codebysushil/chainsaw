name: Hack CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:20.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # 🧠 Cache dependencies (Composer + Hack)
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            vendor
            ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Setup HHVM Action
        uses: azjezz/setup-hhvm@v1.0.0
      
      - name: Verify HHVM
        run: hhvm --version
